<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ContractIQ — Review Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c25;
    --surface2: #1e2330;
    --border: #2a2f3d;
    --border2: #353b4d;
    --text: #e2e6f0;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --green: #3dd68c;
    --green-dim: rgba(61,214,140,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --red: #f05252;
    --red-dim: rgba(240,82,82,0.12);
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --radius: 8px;
    --radius-sm: 4px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .header-meta { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 420px;
    height: calc(100vh - 56px);
  }

  .left-panel {
    overflow-y: auto;
    padding: 28px 32px;
    border-right: 1px solid var(--border);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .queue-count { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 600; font-family: var(--mono); line-height: 1; }
  .stat-value.pending { color: var(--amber); }
  .stat-value.cleared { color: var(--green); }
  .stat-value.escalated { color: var(--red); }
  .stat-value.total { color: var(--text); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    background: var(--surface2);
  }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.selected { background: var(--accent-dim); border-left: 2px solid var(--accent); }
  td { padding: 12px 16px; vertical-align: middle; }
  .contract-name { font-weight: 500; font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .contract-vendor { font-size: 12px; color: var(--text-muted); }
  .uploaded-time { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
  .reviewer-name { font-size: 12px; color: var(--text-muted); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge-pending { background: var(--amber-dim); color: var(--amber); }
  .badge-pending::before { background: var(--amber); }
  .badge-cleared { background: var(--green-dim); color: var(--green); }
  .badge-cleared::before { background: var(--green); }
  .badge-escalated { background: var(--red-dim); color: var(--red); }
  .badge-escalated::before { background: var(--red); }
  .badge-flagged { background: var(--amber-dim); color: var(--amber); }
  .badge-flagged::before { background: var(--amber); }

  .review-type-tag {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .right-panel { overflow-y: auto; background: var(--surface); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }
  .empty-icon { font-size: 32px; opacity: 0.4; }
  .empty-text { font-size: 13px; }

  .detail-panel { display: none; }
  .detail-panel.visible { display: block; }

  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .detail-filename { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .detail-vendor { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .detail-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .section-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .review-body { padding: 24px; }

  .form-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .checklist { margin-bottom: 20px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .check-label { cursor: pointer; flex: 1; }
  .check-item.checked .check-label { color: var(--text-muted); text-decoration: line-through; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
  input[type="text"], select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 72px; }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #3d7ef5; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid var(--border); color: var(--red); }
  .btn-danger:hover { background: var(--red-dim); }

  .result-section { margin-bottom: 20px; }
  .result-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
  .result-risk {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .risk-high { background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,82,82,0.3); }
  .risk-medium { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .risk-low { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,214,140,0.3); }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { padding: 3px 10px; border-radius: 4px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }
  .tag.missing { background: var(--red-dim); border-color: rgba(240,82,82,0.2); color: var(--red); }
  .tag.problem { background: var(--amber-dim); border-color: rgba(245,166,35,0.2); color: var(--amber); }

  .obligations-list { list-style: none; }
  .obligations-list li { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); display: flex; gap: 8px; align-items: flex-start; }
  .obligations-list li::before { content: '→'; color: var(--text-dim); flex-shrink: 0; margin-top: 1px; }
  .obligations-list li:last-child { border-bottom: none; }

  .review-summary { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .review-summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .review-summary-row:last-child { border-bottom: none; }
  .review-summary-key { color: var(--text-muted); }
  .review-summary-val { color: var(--text); font-weight: 500; }

  .escalation-notice {
    background: var(--red-dim);
    border: 1px solid rgba(240,82,82,0.3);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--red);
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* PENDING RESULT STATE */
  .pending-review-notice {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .pending-review-notice .notice-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.5; }

  .btn-scan {
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-scan:hover { border-color: var(--accent); color: var(--accent); }
  .btn-scan.scanning { opacity: 0.6; cursor: not-allowed; }
  .scan-toast {
    font-size: 12px;
    color: var(--green);
    font-family: var(--mono);
    margin-left: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .scan-toast.visible { opacity: 1; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📄</div>
    ContractIQ — Review Portal
  </div>
  <div class="header-meta" id="header-time"></div>
</header>

<div class="layout">

  <!-- LEFT: CONTRACT QUEUE -->
  <div class="left-panel">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value total" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value pending" id="stat-pending">—</div></div>
      <div class="stat-card"><div class="stat-label">Cleared</div><div class="stat-value cleared" id="stat-cleared">—</div></div>
      <div class="stat-card"><div class="stat-label">Escalated</div><div class="stat-value escalated" id="stat-escalated">—</div></div>
    </div>

    <div class="panel-header">
      <div class="panel-title">Contract Queue</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="scan-toast" id="scan-toast"></span>
        <div class="queue-count" id="queue-count"></div>
        <button class="btn-scan" id="btn-scan" onclick="scanContracts()">⟳ Check for New</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Contract</th>
            <th>Uploaded</th>
            <th>Status</th>
            <th>Reviewer</th>
          </tr>
        </thead>
        <tbody id="contracts-tbody">
          <tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-dim)">Loading contracts...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: DETAIL + MANUAL REVIEW ONLY -->
  <div class="right-panel" id="right-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">↖</div>
      <div class="empty-text">Select a contract from the queue<br>to begin review</div>
    </div>

    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <div class="detail-filename" id="detail-filename"></div>
        <div class="detail-vendor" id="detail-vendor"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>

      <div class="section-header">Manual Review</div>

      <div class="review-body" id="review-body">
        <!-- populated by JS based on status -->
      </div>
    </div>
  </div>
</div>

<script>
let contracts = [];
let selectedId = null;

function updateTime() {
  const now = new Date();
  document.getElementById('header-time').textContent =
    now.toLocaleDateString('en-IN', {weekday:'short', day:'2-digit', month:'short'}) + '  ' +
    now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
}
updateTime();
setInterval(updateTime, 10000);

function badgeClass(status) {
  if (!status) return 'badge-pending';
  const s = status.toLowerCase();
  if (s.includes('pending')) return 'badge-pending';
  if (s.includes('cleared')) return 'badge-cleared';
  if (s.includes('escalated') || s.includes('high')) return 'badge-escalated';
  if (s.includes('flagged') || s.includes('medium')) return 'badge-flagged';
  return 'badge-pending';
}

function timeAgo(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

async function loadContracts(forceRender = false) {
  const res = await fetch('/api/contracts');
  contracts = await res.json();
  renderTable();
  updateStats();
  if (selectedId && forceRender) {
    const c = contracts.find(x => x.id === selectedId);
    if (c) renderDetail(c);
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = contracts.length;
  document.getElementById('stat-pending').textContent = contracts.filter(c => c.status === 'Pending Review').length;
  document.getElementById('stat-cleared').textContent = contracts.filter(c => c.status.includes('Cleared')).length;
  document.getElementById('stat-escalated').textContent = contracts.filter(c => c.status.includes('Escalated')).length;
  document.getElementById('queue-count').textContent = contracts.filter(c => c.status === 'Pending Review').length + ' pending review';
}

function renderTable() {
  const tbody = document.getElementById('contracts-tbody');
  if (!contracts.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-dim)">No contracts found. Run seed_contracts.py</td></tr>`;
    return;
  }
  tbody.innerHTML = contracts.map(c => {
    const isSelected = c.id === selectedId ? 'selected' : '';
    const reviewerTag = c.review_type ? `<span class="review-type-tag">${c.review_type}</span>` : '';
    const reviewerName = c.reviewer ? `<div class="reviewer-name">${c.reviewer}</div>` : `<div style="color:var(--text-dim);font-size:12px">—</div>`;
    return `
      <tr class="${isSelected}" onclick="selectContract(${c.id})">
        <td>
          <div class="contract-name">${c.filename.replace('.pdf','')}</div>
          <div class="contract-vendor">${c.vendor}</div>
        </td>
        <td><div class="uploaded-time">${timeAgo(c.uploaded_at)}</div></td>
        <td><span class="badge ${badgeClass(c.status)}">${c.status}</span></td>
        <td>${reviewerTag} ${reviewerName}</td>
      </tr>`;
  }).join('');
}

function selectContract(id) {
  selectedId = id;
  renderTable();
  const c = contracts.find(x => x.id === id);
  if (c) renderDetail(c);
}

function renderDetail(c) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('detail-panel').classList.add('visible');

  document.getElementById('detail-filename').textContent = c.filename;
  document.getElementById('detail-vendor').textContent = c.vendor;
  document.getElementById('detail-meta').innerHTML = `
    <span class="badge ${badgeClass(c.status)}">${c.status}</span>
    <span style="font-size:12px;color:var(--text-muted)">Uploaded ${timeAgo(c.uploaded_at)}</span>
  `;

  const body = document.getElementById('review-body');

  if (c.status !== 'Pending Review') {
    // Show completed review result
    const riskClass = c.risk_score === 'High' ? 'risk-high' : c.risk_score === 'Medium' ? 'risk-medium' : 'risk-low';
    const escalationHtml = c.risk_score === 'High'
      ? `<div class="escalation-notice">⚠ This contract has been escalated for legal review. Human sign-off required before proceeding.</div>` : '';

    body.innerHTML = `
      <div class="review-summary">
        <div class="review-summary-row"><span class="review-summary-key">Reviewed by</span><span class="review-summary-val">${c.reviewer || '—'}</span></div>
        <div class="review-summary-row"><span class="review-summary-key">Completed</span><span class="review-summary-val">${timeAgo(c.reviewed_at)}</span></div>
        ${c.manual_notes ? `<div class="review-summary-row"><span class="review-summary-key">Notes</span><span class="review-summary-val">${c.manual_notes}</span></div>` : ''}
      </div>
      <div class="result-section">
        <div class="result-title">Risk Assessment</div>
        <div class="result-risk ${riskClass}">${c.risk_score} Risk</div>
      </div>
      ${escalationHtml}
      <div class="divider"></div>
      <button class="btn btn-danger" onclick="resetContract(${c.id})">↺ Reset for Demo</button>
    `;
    return;
  }

  // Show manual review form
  body.innerHTML = `
    <div class="form-section-title">Compliance Checklist</div>
    <div class="checklist">
      <div class="check-item" id="ci-liability">
        <input type="checkbox" id="chk-liability"> <label class="check-label" for="chk-liability">Limitation of Liability clause present</label>
      </div>
      <div class="check-item" id="ci-indemnification">
        <input type="checkbox" id="chk-indemnification"> <label class="check-label" for="chk-indemnification">Indemnification clause present</label>
      </div>
      <div class="check-item" id="ci-termination">
        <input type="checkbox" id="chk-termination"> <label class="check-label" for="chk-termination">Termination rights defined</label>
      </div>
      <div class="check-item" id="ci-dataprot">
        <input type="checkbox" id="chk-dataprot"> <label class="check-label" for="chk-dataprot">Data Protection / Privacy clause present</label>
      </div>
      <div class="check-item" id="ci-ip">
        <input type="checkbox" id="chk-ip"> <label class="check-label" for="chk-ip">Intellectual Property ownership defined</label>
      </div>
      <div class="check-item" id="ci-payment">
        <input type="checkbox" id="chk-payment"> <label class="check-label" for="chk-payment">Payment terms within Net 30 days</label>
      </div>
      <div class="check-item" id="ci-prohibited">
        <input type="checkbox" id="chk-prohibited"> <label class="check-label" for="chk-prohibited">No prohibited terms found</label>
      </div>
    </div>

    <div class="form-section-title">Review Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Reviewer Name</label>
        <input type="text" id="reviewer-name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>Risk Assessment</label>
        <select id="manual-risk">
          <option value="">— Select risk level —</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="manual-notes" placeholder="Add review notes, concerns, or context..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-submit-manual">Submit Review</button>
      <button class="btn btn-ghost" id="btn-reset">Reset</button>
    </div>
  `;

  // Rebind events after innerHTML replacement
  document.querySelectorAll('.check-item input[type="checkbox"]').forEach(chk => {
    chk.addEventListener('change', function() {
      this.closest('.check-item').classList.toggle('checked', this.checked);
    });
  });

  document.getElementById('btn-submit-manual').addEventListener('click', submitManual);
  document.getElementById('btn-reset').addEventListener('click', async () => {
    await fetch(`/api/contracts/${selectedId}/reset`, { method: 'POST' });
    await loadContracts(true);
  });
}

async function submitManual() {
  if (!selectedId) return;
  const reviewer = document.getElementById('reviewer-name').value.trim();
  const risk = document.getElementById('manual-risk').value;
  if (!reviewer) { alert('Please enter reviewer name'); return; }
  if (!risk) { alert('Please select a risk level'); return; }

  const btn = document.getElementById('btn-submit-manual');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> Submitting...';

  await fetch(`/api/contracts/${selectedId}/manual-review`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      reviewer,
      limitation_of_liability: document.getElementById('chk-liability').checked,
      indemnification: document.getElementById('chk-indemnification').checked,
      termination_rights: document.getElementById('chk-termination').checked,
      data_protection: document.getElementById('chk-dataprot').checked,
      ip_ownership: document.getElementById('chk-ip').checked,
      payment_terms_ok: document.getElementById('chk-payment').checked,
      no_prohibited_terms: document.getElementById('chk-prohibited').checked,
      risk_score: risk,
      notes: document.getElementById('manual-notes').value
    })
  });

  await loadContracts(true);
}

async function resetContract(id) {
  await fetch(`/api/contracts/${id}/reset`, { method: 'POST' });
  await loadContracts(true);
}

async function scanContracts() {
  const btn = document.getElementById('btn-scan');
  const toast = document.getElementById('scan-toast');
  btn.classList.add('scanning');
  btn.textContent = '⟳ Scanning...';
  try {
    const res = await fetch('/api/contracts/scan', { method: 'POST' });
    const data = await res.json();
    toast.textContent = data.message;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 3000);
    if (data.count > 0) await loadContracts(false);
  } catch(e) {
    toast.textContent = 'Scan failed.';
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 3000);
  }
  btn.classList.remove('scanning');
  btn.textContent = '⟳ Check for New';
}

loadContracts();
setInterval(loadContracts, 5000);
</script>
</body>
</html>
